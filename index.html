<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drifters Delight</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
        header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .hero {
            text-align: center;
            padding: 50px 0;
        }
        .form-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            margin: 20px auto;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Drifters Delight</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#products">Featured Products</a>
            <a href="#order">Quick Order</a>
        </nav>
    </header>
    <section class="hero">
        <h2>Welcome to Drifters Delight!</h2>
        <p>Your one-stop shop for everything amazing.</p>
    </section>
    <section id="order" class="form-container">
        <h3>Quick Order Form</h3>
        <form id="order-form">
            <input type="text" name="name" placeholder="Your Name" required><br>
            <input type="email" name="email" placeholder="Your Email" required><br>
            <textarea name="order" placeholder="Order Details" required></textarea><br>
            <button type="submit">Submit Order</button>
        </form>
    </section>
    <section id="products">
        <h3>Featured Products</h3>
        <div><!-- Add product listings here --></div>
    </section>
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("hXOOo_HRmFLMnmWnD");
        })();

        document.getElementById("order-form").addEventListener("submit", function(event) {
            event.preventDefault();
            emailjs.sendForm("service_8myzxuy", "template_py6u9up", this)
                .then(function() {
                    alert('Order submitted successfully!');
                }, function(error) {
                    alert('Failed to send order: ' + JSON.stringify(error));
                });
        });
    </script>
</body>
</html>
