<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tie Dye Artist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .banner {
            background-image: url('banner.jpg'); /* Banner image path */
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5em;
            background-size: cover;
        }
        .order-box {
            padding: 20px;
            text-align: center;
        }
        .shop {
            display: flex;
            overflow: auto;
            padding: 10px;
        }
        .product {
            border: 1px solid #ccc;
            margin: 5px;
            padding: 10px;
            width: 30%;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="banner">
        <h1>Tie Dye Artist Name</h1>
    </div>
    <div class="order-box">
        <h2>Custom Order</h2>
        <form>
            <label for="custom-order">Order Details:</label><br>
            <textarea id="custom-order" name="custom-order" rows="4" cols="50"></textarea><br>
            <input type="submit" value="Submit Order">
        </form>
    </div>
    <div class="shop">
        <div class="product">
            <h3>Tie Dye T-Shirt</h3>
            <p>Price: $25</p>
            <button>Buy Now</button>
        </div>
        <div class="product">
            <h3>Tie Dye Hoodie</h3>
            <p>Price: $40</p>
            <button>Buy Now</button>
        </div>
        <div class="product">
            <h3>Tie Dye Tote Bag</h3>
            <p>Price: $15</p>
            <button>Buy Now</button>
        </div>
        <div class="product">
            <h3>Tie Dye Socks</h3>
            <p>Price: $10</p>
            <button>Buy Now</button>
        </div>
        <div class="product">
            <h3>Tie Dye Bandana</h3>
            <p>Price: $12</p>
            <button>Buy Now</button>
        </div>
        <div class="product">
            <h3>Tie Dye Scarf</h3>
            <p>Price: $18</p>
            <button>Buy Now</button>
        </div>
    </div>
</body>
</html>
