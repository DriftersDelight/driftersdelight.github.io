<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Orders</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .form-container { width: 50%; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        input[type="file"] { display: none; }
        .file-preview { margin: 10px 0; }
        img { max-width: 200px; max-height: 200px; }
        .error { color: red; }
    </style>
</head>
<body>
<div class="form-container">
    <h1>Custom Orders</h1>
    <form id="customOrderForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="file">Upload Image:</label>
        <input type="file" id="fileUpload" accept="image/*" onchange="previewFile()">
        <button type="button" onclick="document.getElementById('fileUpload').click();">Choose File</button>
        <div class="file-preview" id="filePreview"></div>
        <br>
        <button type="submit">Submit</button>
        <div class="error" id="formError"></div>
    </form>
</div>
<script>
    function previewFile() {
        const file = document.getElementById('fileUpload').files[0];
        const preview = document.getElementById('filePreview');
        const errorDiv = document.getElementById('formError');
        preview.innerHTML = '';
        errorDiv.innerHTML = '';
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                preview.appendChild(img);
            };
            reader.readAsDataURL(file);
        } else {
            errorDiv.innerHTML = 'No file selected.';
        }
    }

    document.getElementById('customOrderForm').onsubmit = function(event) {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const file = document.getElementById('fileUpload').files[0];
        if (!file) {
            event.preventDefault();
            document.getElementById('formError').innerHTML = 'Please upload an image file.';
        }
    };
</script>
</body>
</html>
